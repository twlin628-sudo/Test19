<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 聊天測試</title>
<style>
  body { font-family: system-ui, "Noto Sans TC", sans-serif; max-width: 760px;
         margin: 24px auto; padding: 0 16px; line-height: 1.6; color: #222; }
  h1 { font-size: 1.3rem; }
  label { font-size: .85rem; color: #555; display: block; margin-top: 10px; }
  textarea, button, select { font-size: 1rem; padding: 8px; box-sizing: border-box; }
  textarea { width: 100%; border: 1px solid #ccc; border-radius: 6px; resize: vertical; }
  select { width: 100%; border: 1px solid #ccc; border-radius: 6px; background: #fff; }
  button { cursor: pointer; background: #2563eb; color: #fff; border: none;
           border-radius: 6px; padding: 10px 16px; }
  button:disabled { opacity: .5; cursor: default; }
  #answer { white-space: pre-wrap; background: #f7f7f8; border: 1px solid #eee;
            border-radius: 8px; padding: 14px; margin-top: 12px; min-height: 60px; }
  #status { font-size: .85rem; color: #666; margin-top: 8px; }
  #timer { font-size: .85rem; color: #2563eb; margin-top: 4px; font-variant-numeric: tabular-nums; }
  .err { color: #b91c1c; }
</style>
</head>
<body>
  <h1>🌐 AI 聊天測試</h1>
  <label>選擇後端</label>
  <select id="worker">
    <option value="https://morning-river-18bc.twlin628.workers.dev">OpenRouter（openrouter/free）</option>
    <option value="https://patient-wave-276e.twlin628.workers.dev">Google AI Studio（Gemma 4 26B）</option>
	<option value="https://spring-art-db47.twlin628.workers.dev">ai.yy2go.cc（gemma4:e4b）</option>
  </select>
  <label>你的問題</label>
  <textarea id="q" rows="3">用一句話介紹台灣。</textarea>
  <div style="margin-top:10px"><button id="send" onclick="ask()">送出</button></div>
  <div id="timer"></div>
  <div id="status"></div>
  <div id="answer"></div>
<script>
let timerInterval = null;
let startTime = null;

function startTimer() {
  startTime = Date.now();
  document.getElementById("timer").textContent = "⏱ 0.0 秒";
  timerInterval = setInterval(() => {
    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
    document.getElementById("timer").textContent = `⏱ ${elapsed} 秒`;
  }, 100);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
  document.getElementById("timer").textContent = `⏱ ${elapsed} 秒（完成）`;
}

function setStatus(msg, isErr) {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = isErr ? "err" : "";
}

async function ask() {
  const BASE = document.getElementById("worker").value;
  const question = document.getElementById("q").value.trim();
  if (!question) return setStatus("請先輸入問題。", true);

  const btn = document.getElementById("send");
  btn.disabled = true;
  document.getElementById("answer").textContent = "";
  document.getElementById("timer").textContent = "";
  setStatus("送出中…");
  startTimer();

  try {
    const res = await fetch(BASE + "/api/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        messages: [{ role: "user", content: question }],
        stream: true,
      }),
    });

    if (!res.ok) {
      const text = await res.text();
      throw new Error(`HTTP ${res.status}：${text.slice(0, 200)}`);
    }

    const contentType = res.headers.get("Content-Type") || "";
    let fullText = "";
    let modelUsed = "";

    if (contentType.includes("text/event-stream")) {
      // Stream 模式
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      setStatus("回應中…");

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value, { stream: true });

        // 用 regex 抓出所有 data: 後面的內容
        const matches = chunk.matchAll(/data:\s*(\{[\s\S]*?\})(?=data:|$)/g);

        for (const match of matches) {
          const json = match[1].trim();
          try {
            const obj = JSON.parse(json);
            if (!modelUsed && obj.model) modelUsed = obj.model;
            const delta = obj.choices?.[0]?.delta?.content ?? "";
            fullText += delta;
            document.getElementById("answer").textContent = fullText;
          } catch {}
        }
      }
    } else {
      // 非 stream 模式
      setStatus("回應中…");
      const data = await res.json();
      fullText = data.choices?.[0]?.message?.content ?? "(沒有回應內容)";
      modelUsed = data.model ?? "";
      document.getElementById("answer").textContent = fullText;
    }

    stopTimer();
    setStatus(modelUsed ? `完成（模型：${modelUsed}）` : "完成");

  } catch (e) {
    stopTimer();
    setStatus("失敗：" + e.message, true);
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
